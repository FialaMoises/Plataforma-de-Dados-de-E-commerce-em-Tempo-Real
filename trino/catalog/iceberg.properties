# Catálogo Trino que lê as tabelas Iceberg via o mesmo REST catalog + MinIO.
# Permite consultar bronze/silver/gold em SQL sem mover dados (engine-agnostic, ADR-0001).
connector.name=iceberg
iceberg.catalog.type=rest
iceberg.rest-catalog.uri=http://iceberg-rest:8181
iceberg.rest-catalog.warehouse=s3://warehouse/

# Acesso S3 (MinIO) para ler os arquivos de dados das tabelas.
fs.native-s3.enabled=true
s3.endpoint=http://minio:9000
s3.region=us-east-1
s3.path-style-access=true
s3.aws-access-key=admin
s3.aws-secret-key=password
