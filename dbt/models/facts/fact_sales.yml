version: 2

models:
  - name: fact_sales
    description: >
      Star schema fact table for e-commerce sales. One row per purchase event.
      Joins with dim_date, dim_products, and dim_users for analytical queries.
      Partitioned by event_date.
    columns:
      - name: event_id
        description: Unique purchase event identifier (degenerate dimension).
        tests:
          - unique
          - not_null
      - name: date_key
        description: Foreign key to dim_date.
        tests:
          - not_null
          - relationships:
              to: ref('dim_date')
              field: date_key
      - name: product_id
        description: Foreign key to dim_products.
        tests:
          - not_null
          - relationships:
              to: ref('dim_products')
              field: product_id
      - name: user_id
        description: Foreign key to dim_users.
        tests:
          - not_null
          - relationships:
              to: ref('dim_users')
              field: user_id
      - name: quantity
        description: Units purchased.
        tests:
          - not_null
      - name: unit_price
        description: Price per unit at time of purchase.
        tests:
          - not_null
      - name: gross_amount
        description: Total amount for this line (quantity * unit_price).
        tests:
          - not_null
      - name: currency
        description: "ISO currency code (BRL, USD, EUR)."
        tests:
          - not_null
          - accepted_values:
              values: ['BRL', 'USD', 'EUR']
      - name: channel
        description: Sales channel (web, mobile, api, etc.).
      - name: event_ts
        description: Timestamp of the purchase event.
        tests:
          - not_null
      - name: event_date
        description: Date of the purchase event (partition key).
        tests:
          - not_null
