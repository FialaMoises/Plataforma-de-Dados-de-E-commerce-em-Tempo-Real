name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dev deps
        run: pip install -r requirements-dev.txt pyyaml

      - name: Lint (ruff)
        run: ruff check . && ruff format --check .

      - name: Validate data contracts (JSON Schema parse)
        run: python -c "import json,glob;[json.load(open(f)) for f in glob.glob('contracts/*.json')];print('contracts OK')"

      - name: Validate Avro schemas
        run: python -c "import json,glob;[json.load(open(f)) for f in glob.glob('contracts/*.avsc')];print('avro schemas OK')"

      - name: Validate YAML configs
        run: python -c "import yaml,glob;[yaml.safe_load(open(f)) for f in glob.glob('monitoring/**/*.yml',recursive=True)+glob.glob('dbt/**/*.yml',recursive=True)];print('yaml OK')"

      - name: Unit tests
        run: pytest -q

  build-images:
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build generator image
        run: docker build -f generator/Dockerfile -t generator:ci .
      - name: Validate docker-compose
        run: docker compose --profile core --profile orchestration --profile bi --profile monitoring config -q

  terraform:
    needs: quality
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.6"

      - name: Terraform Init
        run: terraform init -backend=false

      - name: Terraform Validate
        run: terraform validate
