# ─────────────────────────────────────────────────────────────────────────────
# Stack local da Plataforma Lakehouse — Vertical Slice (evento `purchase`).
#
# Perfis (profiles) para não subir tudo de uma vez:
#   core          -> kafka, minio, iceberg-rest, spark, generator   (slice E2E)
#   orchestration -> postgres + airflow                              (Fase 5)
#   monitoring    -> prometheus, grafana, kafka-exporter             (Fase 6)
#   bi            -> trino, dashboard streamlit                      (Fase 8)
#   metabase      -> metabase (BI clássico alternativo)
#
# Subir só o core:   docker compose --profile core up -d
# ─────────────────────────────────────────────────────────────────────────────
name: ecommerce-lakehouse

services:
  # ── Kafka (KRaft, single broker — sem Zookeeper) ───────────────────────────
  kafka:
    image: apache/kafka:3.7.1
    profiles: ["core"]
    container_name: kafka
    deploy:
      resources:
        limits:
          memory: 1g
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093,EXTERNAL://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_NUM_PARTITIONS: 6
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 24
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10

  # ── MinIO (object store S3-compatible) ─────────────────────────────────────
  minio:
    image: minio/minio:RELEASE.2024-06-13T22-53-53Z
    profiles: ["core"]
    container_name: minio
    deploy:
      resources:
        limits:
          memory: 512m
    ports:
      - "9000:9000"   # API S3
      - "9001:9001"   # Console web
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-admin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-password}
      MINIO_DOMAIN: minio
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - minio-data:/data

  # ── Cria o bucket `warehouse` na subida ────────────────────────────────────
  minio-init:
    image: minio/mc:RELEASE.2024-06-12T14-34-03Z
    profiles: ["core"]
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-admin} ${MINIO_ROOT_PASSWORD:-password};
      mc mb --ignore-existing local/${WAREHOUSE_BUCKET:-warehouse};
      echo 'bucket pronto'; exit 0;
      "

  # ── Iceberg REST Catalog (metadados do lakehouse, warehouse no MinIO) ───────
  iceberg-rest:
    image: tabulario/iceberg-rest:1.6.0
    profiles: ["core"]
    container_name: iceberg-rest
    ports:
      - "8181:8181"
    depends_on:
      minio:
        condition: service_healthy
    environment:
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-admin}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-password}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      CATALOG_WAREHOUSE: s3://${WAREHOUSE_BUCKET:-warehouse}/
      CATALOG_IO__IMPL: org.apache.iceberg.aws.s3.S3FileIO
      CATALOG_S3_ENDPOINT: http://minio:9000
      CATALOG_S3_PATH__STYLE__ACCESS: "true"

  # ── Spark + Iceberg (executor dos jobs Bronze/Silver/Gold) ─────────────────
  spark:
    build: ./spark        # apache/spark + pandas/pyarrow (applyInPandasWithState)
    image: ecommerce-lakehouse-spark
    profiles: ["core"]
    container_name: spark
    user: root   # escreve checkpoints + cache Ivy dos pacotes Iceberg/Kafka
    deploy:
      resources:
        limits:
          memory: 2g
    depends_on:
      kafka:
        condition: service_healthy
      iceberg-rest:
        condition: service_started
      minio:
        condition: service_healthy
    environment:
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-admin}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-password}
      AWS_REGION: ${AWS_REGION:-us-east-1}
    ports:
      - "8090:8080"   # Spark master UI (8080 já costuma estar em uso no host)
      - "4040:4040"   # Spark application UI (durante um job)
    volumes:
      - ./spark/conf/spark-defaults.conf:/opt/spark/conf/spark-defaults.conf
      - ./spark/jobs:/opt/spark/jobs
      - ./contracts:/opt/spark/contracts
      - spark-checkpoints:/opt/spark/checkpoints
    # mantém o container vivo para rodarmos jobs via `docker compose exec`
    entrypoint: ["/bin/sh", "-c", "tail -f /dev/null"]

  # ── Schema Registry (Avro + compatibilidade BACKWARD) ───────────────────────
  schema-registry:
    image: confluentinc/cp-schema-registry:7.6.1
    profiles: ["core"]
    container_name: schema-registry
    depends_on:
      kafka:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512m
    ports:
      - "8085:8081"
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: kafka:9092
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
      SCHEMA_REGISTRY_SCHEMA_COMPATIBILITY_LEVEL: BACKWARD

  # ── Simulador de eventos (producer) ────────────────────────────────────────
  generator:
    build:
      context: .
      dockerfile: generator/Dockerfile
    profiles: ["core"]
    container_name: generator
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP: ${KAFKA_BOOTSTRAP:-kafka:9092}
      SCHEMA_REGISTRY_URL: ${SCHEMA_REGISTRY_URL:-http://schema-registry:8081}
      TOPIC_PURCHASES: ${TOPIC_PURCHASES:-purchases}
      TOPIC_CARTS: ${TOPIC_CARTS:-carts}
      EVENTS_PER_SECOND: ${EVENTS_PER_SECOND:-20}
      BAD_EVENT_RATE: ${BAD_EVENT_RATE:-0.03}
      DUPLICATE_RATE: ${DUPLICATE_RATE:-0.02}
      LATE_EVENT_RATE: ${LATE_EVENT_RATE:-0.05}
      CART_SESSION_RATE: ${CART_SESSION_RATE:-0.15}
      CART_CONVERSION: ${CART_CONVERSION:-0.6}
    restart: unless-stopped

  # ── Orquestração (perfil opcional) ─────────────────────────────────────────
  postgres:
    image: postgres:16
    profiles: ["orchestration"]
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - pg-data:/var/lib/postgresql/data

  airflow:
    image: apache/airflow:2.9.3
    profiles: ["orchestration"]
    depends_on: [postgres]
    user: "0:0"   # root para conseguir falar com o socket do Docker (disparar jobs Spark)
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    ports:
      - "8081:8080"
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - /var/run/docker.sock:/var/run/docker.sock
    # A DAG dispara `docker exec spark spark-submit ...`; por isso instalamos o CLI do Docker.
    deploy:
      resources:
        limits:
          memory: 1g
    command: >
      bash -c "apt-get update -qq && apt-get install -y -qq docker.io >/dev/null 2>&1 || true;
               airflow db migrate &&
               airflow users create --username admin --password admin --firstname a --lastname d --role Admin --email dev@local || true;
               (airflow scheduler &) && airflow webserver"

  # ── Analytics / BI (perfil bi) ─────────────────────────────────────────────
  # Trino: engine SQL que lê as tabelas Iceberg (bronze/silver/gold) sem mover dados.
  trino:
    image: trinodb/trino:453
    profiles: ["bi"]
    container_name: trino
    # Requer o perfil `core` (minio + iceberg-rest) já no ar — ver README.
    ports:
      - "8083:8080"   # Trino UI / API (8080 interno)
    volumes:
      - ./trino/catalog:/etc/trino/catalog

  # Dashboard Streamlit: Camada 8 (Executivo / Produto / Operacional) sobre o Gold real.
  dashboard:
    build: ./dashboard
    profiles: ["bi"]
    container_name: dashboard
    depends_on:
      trino:
        condition: service_started
    environment:
      TRINO_HOST: trino
      TRINO_PORT: "8080"
      KAFKA_BOOTSTRAP: ${KAFKA_BOOTSTRAP:-kafka:9092}
      TOPIC_PURCHASES: ${TOPIC_PURCHASES:-purchases}
    volumes:
      - ./dashboard/app.py:/app/app.py   # hot-reload do app sem rebuild
    ports:
      - "8501:8501"   # http://localhost:8501

  # ── Metabase (BI clássico — perfil opcional alternativo) ───────────────────
  metabase:
    image: metabase/metabase:v0.50.8
    profiles: ["metabase"]
    ports:
      - "3000:3000"

  # ── Observabilidade (perfil monitoring — Fase 6) ──────────────────────────
  kafka-exporter:
    image: danielqsj/kafka-exporter:v1.7.0
    profiles: ["monitoring"]
    container_name: kafka-exporter
    command:
      - --kafka.server=kafka:9092
      - --topic.filter=purchases|carts
      - --group.filter=.*
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "9308:9308"

  prometheus:
    image: prom/prometheus:v2.53.0
    profiles: ["monitoring"]
    container_name: prometheus
    depends_on:
      - kafka-exporter
    deploy:
      resources:
        limits:
          memory: 256m
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./monitoring/alerting/rules.yml:/etc/prometheus/rules.yml
      - prometheus-data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=7d

  grafana:
    image: grafana/grafana:11.1.0
    profiles: ["monitoring"]
    container_name: grafana
    deploy:
      resources:
        limits:
          memory: 256m
    depends_on:
      - prometheus
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards
      - grafana-data:/var/lib/grafana

volumes:
  minio-data:
  spark-checkpoints:
  pg-data:
  prometheus-data:
  grafana-data:
